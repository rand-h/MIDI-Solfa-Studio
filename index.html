<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solfa Studio</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/midi-writer-js@3.1.1/browser/midiwriter.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>


    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="navbar">
        <div class="brand">
            <a href="https://github.com/rand-h/MIDI-Solfa-Studio" class="brand-solfa">
                <i class="fas fa-wave-square"></i> Solfa Studio
            </a>

            <span class="brand-separator">✕</span>

            <a href="https://github.com/Bewelge/MIDIano" target="_blank" class="brand-midiano">
                MIDIano
            </a>
        </div>

        <div class="nav-section">
            <span class="nav-label">Source</span>
            <select id="typeSelect">
                <option value="ffpm">FFPM</option>
                <option value="ff">FF</option>
                <option value="tsanta">Tsanta</option>
                <option value="antema">Antema</option>
            </select>
            <input type="number" id="numInput" value="1" min="1">
            <button class="btn" onclick="loadAndAnalyze()">
                <i class="fa fa-play"></i>
            </button>
        </div>

        <div class="nav-section">
            <span class="nav-label">Fichier</span>
            <button class="btn" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-folder-open"></i> Solfa PDF
            </button>
            <input type="file" id="fileInput" accept=".html,.pdf" style="display: none;" onchange="handleFileSelect(this)">
            <input type="text" id="urlInput" placeholder="url...">
            <button class="btn btn-icon" style="border:1px solid var(--border)" onclick="handleUrlImport()"><i class="fas fa-arrow-right"></i></button>
        </div>

        <div class="nav-section">
            <span class="nav-label">Transpose</span>
            <div class="transpose-ui">
                <button class="t-btn" onclick="updateTranspose(-1)"><i class="fas fa-minus"></i></button>
                <span id="transDisplay">C</span>
                <button class="t-btn" onclick="updateTranspose(1)"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <div class="view-controls">
            <button id="btn-split" class="btn-icon view-btn active" onclick="setView('split')" title="Vue Partagée">
                <i class="fas fa-columns"></i>
            </button>
            <button id="btn-sheet" class="btn-icon view-btn" onclick="setView('sheet')" title="Partition">
                <i class="fas fa-file-alt"></i>
            </button>
            <button id="btn-midiano" class="btn-icon view-btn" onclick="setView('midiano')" title="Piano"
                style="transform: scale(1.5);" 
            >
                <svg xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" height="1em" viewBox="0 0 24 24" width="1em" fill="currentColor">
                    <rect fill="none" height="24" width="24"></rect>
                    <path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M14,14.5h0.25V19h-4.5v-4.5H10 c0.55,0,1-0.45,1-1V5h2v8.5C13,14.05,13.45,14.5,14,14.5z M5,5h2v8.5c0,0.55,0.45,1,1,1h0.25V19H5V5z M19,19h-3.25v-4.5H16 c0.55,0,1-0.45,1-1V5h2V19z"></path>
                </svg>
            </button>
        </div>
    </div>

    <div class="workspace split" id="workspace">
        <div class="sheet-panel" id="sheetPanel">
            <div id="solfa-viewer">
                <div class="empty-state">
                    <i class="fas fa-music empty-icon"></i>
                    <h3>Prêt à jouer</h3>
                    <p>Sélectionnez un cantique ou importez un fichier pour commencer.</p>
                </div>
            </div>
        </div>

        <div class="resizer" id="dragHandle"></div>

        <div class="midiano-panel" id="midianoPanel">
            <iframe id="midianoFrame" src="MIDIano/index.html"></iframe>
        </div>
    </div>

    <div id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMsg">Message</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
